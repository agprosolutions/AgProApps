<!DOCTYPE html>
<html>
<head>
<title>Acceso ProApps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:-apple-system,Arial;
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
text-align:center;
}

.box{
margin-top:120px;
padding:20px;
}

input{
padding:14px;
border-radius:14px;
border:none;
width:85%;
margin-top:15px;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
margin-top:15px;
width:85%;
font-size:16px;
}

.error{
color:#ef4444;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h1>🔐 Acceso privado</h1>
<p>Introduce tu código</p>

<input id="code" placeholder="Código de acceso">
<button onclick="checkCode()">Entrar</button>

<p id="error" class="error"></p>
</div>

<script>
var codigosValidos = [
"VIP123",
"PRO777",
"APP2026",
"ACCESO999"
];

function checkCode(){
var code = document.getElementById("code").value;
var error = document.getElementById("error");

if(codigosValidos.includes(code)){
window.location.href = "apps.html";
}else{
error.innerText = "Código incorrecto";
}
}
</script>

</body>
</html>
