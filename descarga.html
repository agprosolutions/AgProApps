<!DOCTYPE html>
<html>
<head>
<title>Acceso ProApps</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.box{
margin-top:100px;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:80%;
margin-top:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin-top:10px;
width:80%;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h1>🔐 Acceso privado</h1>
<p>Introduce tu código</p>

<input id="code" placeholder="Código de acceso">
<br>
<button onclick="checkCode()">Entrar</button>
</div>

<script>
function checkCode(){
var code = document.getElementById("code").value;

if(code === "PRO123"){
window.location.href = "apps.html";
}else{
alert("Código incorrecto");
}
}
</script>

</body>
</html>
