<!DOCTYPE html>
<html>
<head>
<title>Acceso concedido</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

.box{
margin-top:100px;
padding:20px;
}

.code{
font-size:28px;
background:#111827;
padding:15px;
border-radius:12px;
margin:20px auto;
width:80%;
}

.btn{
padding:15px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
width:85%;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>✅ Pago confirmado</h1>
<p>Tu código de acceso es:</p>

<div class="code" id="codigo"></div>

<button class="btn" onclick="copiar()">📋 Copiar código</button>

<a href="descarga.html">
<button class="btn">🔐 Ir a ingresar código</button>
</a>

</div>

<script>

// 🔥 CAMBIA LOS CÓDIGOS AQUÍ
var codigos = [
"VIP123",
"PRO777",
"APP2026",
"CLIENTE1",
"CLIENTE2"
];

// escoger uno al azar
var codigoRandom = codigos[Math.floor(Math.random() * codigos.length)];
document.getElementById("codigo").innerText = codigoRandom;

// copiar
function copiar(){
navigator.clipboard.writeText(codigoRandom);
alert("Código copiado");
}

</script>

</body>
</html>
